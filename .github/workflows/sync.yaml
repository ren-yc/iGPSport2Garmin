name: iGPSport to Garmin Sync

on:
  schedule:
    - cron: "0 5,7,9,11,13 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup dotnet 9.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13.5"

      - name: Cache nuget dependencies
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore Garmin session cache
        uses: actions/cache@v3
        with:
          path: garmin_session
          key: ${{ runner.os }}-garmin-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-garmin-session-

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build FitFaker.NET
        run: dotnet build FitFaker.NET/FitFaker.NET.sln

      - name: Run sync script
        env:
          IGPSPORT_DOMAIN: ${{ secrets.IGPSPORT_DOMAIN || 'prod.en.igpsport.com' }}
          IGPSPORT_REFERER: ${{ secrets.IGPSPORT_REFERER || 'https://login.passport.igpsport.com' }}
          IGPSPORT_USERNAME: ${{ secrets.IGPSPORT_USERNAME }}
          IGPSPORT_PASSWORD: ${{ secrets.IGPSPORT_PASSWORD }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_DOMAIN: ${{ secrets.GARMIN_DOMAIN || 'garmin.com' }}
        run: python sync_igpsport_to_garmin.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_sync_date.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update last sync date [skip ci]"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
